apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  labels:
    app.kubernetes.io/name: registry
    app.kubernetes.io/instance: deepSightAI-Trinetra
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: registry
  template:
    metadata:
      labels:
        app: registry
    spec:
      containers:
      - name: registry
        image: deepSightAI-Trinetra/registry:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: deepSightAI-Trinetra-common-config
        - secretRef:
            name: deepSightAI-Trinetra-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-api
  labels:
    app.kubernetes.io/name: main-api
    app.kubernetes.io/instance: deepSightAI-Trinetra
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: main-api
  template:
    metadata:
      labels:
        app: main-api
    spec:
      containers:
      - name: main-api
        image: deepSightAI-Trinetra/main-api:latest
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: deepSightAI-Trinetra-common-config
        - secretRef:
            name: deepSightAI-Trinetra-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: extractor
  labels:
    app.kubernetes.io/name: extractor
    app.kubernetes.io/instance: deepSightAI-Trinetra
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: extractor
  template:
    metadata:
      labels:
        app: extractor
    spec:
      containers:
      - name: extractor
        image: deepSightAI-Trinetra/extractor:latest
        ports:
        - containerPort: 8001
        envFrom:
        - configMapRef:
            name: deepSightAI-Trinetra-common-config
        - secretRef:
            name: deepSightAI-Trinetra-secrets
        env:
        - name: EXTRACTOR_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: EXTRACTOR_URL
          value: "http://$(EXTRACTOR_ID).deepSightAI-Trinetra-platform.svc.cluster.local:8001"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: embedder
  labels:
    app.kubernetes.io/name: embedder
    app.kubernetes.io/instance: deepSightAI-Trinetra
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: embedder
  template:
    metadata:
      labels:
        app: embedder
    spec:
      containers:
      - name: embedder
        image: deepSightAI-Trinetra/embedder:latest
        ports:
        - containerPort: 8001
        envFrom:
        - configMapRef:
            name: deepSightAI-Trinetra-common-config
        - secretRef:
            name: deepSightAI-Trinetra-secrets
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 60
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 10
