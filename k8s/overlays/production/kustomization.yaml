apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
bases:
- ../../base
nameSuffix: -prod
patchesStrategicMerge:
# Increase replica counts for production
- replicas-patch.yaml
# Add resource limits and requests tuned for production
- resources-patch.yaml
configMapGenerator:
- name: clipsight-common-config
  behavior: merge
  literals:
  - LOG_LEVEL=WARNING
  - ENABLE_METRICS=true
secretGenerator:
- name: clipsight-secrets
  literals:
  - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}  # Must provide via env
  - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
  - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
  - JWT_SECRET_KEY=${JWT_SECRET_KEY}
options:
  disableNameSuffixHash: true
