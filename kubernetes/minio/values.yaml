# MinIO Helm values with SSE-KMS using HashiCorp Vault
# T1.4.3: Enable server-side encryption at rest with KMS

image:
  repository: minio/minio
  tag: RELEASE.2023-10-24T22-10-07Z  # Include a recent version
  pullPolicy: IfNotPresent

# MinIO command and arguments
command: minio
args:
  - /usr/local/bin/minio
  - server
  - /data
  - --config-dir=/etc/minio
  - --json

# Enable console UI
console:
  enabled: true
  service:
    type: ClusterIP
    port: 9090
  ingress:
    enabled: false

# Server configuration
server:
  replicas: 4
  # Use distributed mode with erasure coding
  distributed: true
  # Data directories per pod
  extraVolumes:
    - name: data
      emptyDir: {}
  extraVolumeMounts:
    - name: data
      mountPath: /data

  # Environment variables for KMS (SSE-KMS)
  env:
    # MinIO KMS configuration for Vault Transit Engine
    - name: MINIO_KMS_KMSAPI_ENDPOINT
      value: "https://vault.vault.svc.cluster.local:8200/v1/transit/keys/minio"
    - name: MINIO_KMS_KMSAPI_NAME
      value: "vault"
    - name: MINIO_KMS_MASTER_KEY
      value: "minio-production-key"
    - name: MINIO_KMS_KMSAPI_AUTH_TOKEN
      valueFrom:
        secretKeyRef:
          name: vault-kms-secret
          key: token
    # TLS for internal server communication (optional but recommended)
    - name: MINIO_KMS_KMSAPI_TLS_INSECURE_SKIP_VERIFY
      value: "false"
    - name: MINIO_KMS_KMSAPI_TLS_CA_CERT
      value: "/etc/minio/tls/ca.crt"
    # Server TLS (HTTPS)
    - name: MINIO_DOMAIN
      value: "minio.deepSightAI-Trinetra.local"
    - name: MINIO_SERVER_URL
      value: "https://minio.deepSightAI-Trinetra.local"
  # TLS configuration (MinIO server HTTPS)
  tls:
    enabled: true
    secretName: minio-tls-secret  # TLS cert for MinIO server
    # Alternatively, auto-generate with cert-manager
    autoGenerated: false

  # Security context to run as non-root
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: "OnRootMismatch"

  securityContext:
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: false
    allowPrivilegeEscalation: false

# Persistence using PVC or hostPath (adjust as needed)
persistence:
  enabled: true
  storageClass: standard
  size: 100Gi

# Service for MinIO clients
service:
  type: ClusterIP
  port: 9000
  targetPort: 9000
  annotations:
    metallb.universe.tf/address-pool: default

# Ingress for MinIO console/API (optional, could use separate)
ingress:
  enabled: false

# Resources
resources:
  requests:
    memory: "2Gi"
    cpu: "1000m"
  limits:
    memory: "4Gi"
    cpu: "2000m"

# Node selector/affinity (optional)
# affinity:
#   nodeAffinity:
#     requiredDuringSchedulingIgnoredDuringExecution:
#       nodeSelectorTerms:
#         - matchExpressions:
#             - key: node-role
#               operator: In
#               values:
#                 - storage

# Monitoring, etc.
metrics:
  enabled: true
  serviceMonitor:
    enabled: false
