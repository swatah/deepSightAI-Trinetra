---
# Ingress configuration with TLS 1.3 and strong cipher suites
# T1.4.2: Enforce TLS 1.3 for all ingress traffic

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: clipsight-main-ingress
  namespace: default
  annotations:
    # Use NGINX Ingress Controller
    kubernetes.io/ingress.class: nginx
    # Enable TLS 1.3 and disable older protocols
    nginx.ingress.kubernetes.io/ssl-protocols: "TLSv1.3"
    # Strong cipher suite for TLS 1.3 (only AEAD ciphers)
    nginx.ingress.kubernetes.io/ssl-ciphers: "TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256"
    # Enable HSTS
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # SSL session cache and timeout
    nginx.ingress.kubernetes.io/ssl-session-cache: "true"
    nginx.ingress.kubernetes.io/ssl-session-timeout: "10m"
    # Proxy SSL settings (also enforce TLS 1.3 for backend if using HTTPS)
    nginx.ingress.kubernetes.io/proxy-ssl-protocols: "TLSv1.3"
    nginx.ingress.kubernetes.io/proxy-ssl-ciphers: "TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256"
    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
spec:
  tls:
    - hosts:
        - api.clipsight.local
        - clipsight.local
      secretName: clipsight-tls-secret
  rules:
    - host: api.clipsight.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: main-api
                port:
                  number: 8000
    - host: clipsight.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ui
                port:
                  number: 8501

---
# Default backend TLS redirect - also enforce TLS 1.3
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: clipsight-default-redirect
  namespace: default
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-protocols: "TLSv1.3"
    nginx.ingress.kubernetes.io/ssl-ciphers: "TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256"
spec:
  tls:
    - secretName: clipsight-tls-secret
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: default-http-backend
                port:
                  number: 8080
