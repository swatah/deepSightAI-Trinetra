---
# Certificate for wildcard domain
# T1.4.2: Automatic TLS certificate

apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: deepSightAI-Trinetra-wildcard-cert
  namespace: default
spec:
  secretName: deepSightAI-Trinetra-wildcard-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - "*.deepSightAI-Trinetra.local"
    - "deepSightAI-Trinetra.local"
  privateKey:
    algorithm: ECDSA
    size: 256
  duration: 2160h
  renewBefore: 720h
