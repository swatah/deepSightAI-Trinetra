---
# Certificate for API subdomain
# T1.4.2: Automatic TLS certificate

apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: deepSightAI-Trinetra-api-cert
  namespace: default
spec:
  secretName: deepSightAI-Trinetra-api-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - api.deepSightAI-Trinetra.local
  privateKey:
    algorithm: ECDSA
    size: 256
  duration: 2160h
  renewBefore: 720h
