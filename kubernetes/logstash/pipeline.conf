# Logstash pipeline for audit logs
# T1.5.5: SIEM integration (Splunk/Elastic)
# This configuration consumes audit logs from Kafka and forwards to Splunk/Elastic

input {
  kafka {
    bootstrap_servers => "kafka-cluster:9092"
    topics => ["audit-logs"]
    group_id => "logstash-audit"
    auto_offset_reset => "earliest"
    codec => json {
      charset => "UTF-8"
    }
  }
}

filter {
  # Parse JSON (already parsed by json codec, but we can ensure)
  json {
    source => "message"
  }
  # Optional: add fields for SIEM
  mutate {
    add_field => { "[@metadata][index]" => "audit-%{+YYYY.MM.dd}" }
  }
  # Date filter to parse timestamp
  date {
    match => [ "timestamp", "ISO8601" ]
    target => "@timestamp"
  }
}

output {
  # Output to Splunk via HTTP Event Collector (HEC)
  http {
    http_method => "post"
    urls => ["https://splunk-hec.clipsight.local:8088/services/collector"]
    format => "json"
    message => '{"event": %{message}, "sourcetype": "_json"}'
    # authentication
    user => "splunk-hec-user"
    password => "${SPLUNK_HEC_TOKEN}"
    ssl => true
    cacert => "/etc/logstash/certs/ca.pem"
  }

  # Also output to Elasticsearch for redundancy
  # elasticsearch {
  #   hosts => ["https://elasticsearch.clipsight.local:9200"]
  #   index => "audit-logs-%{+YYYY.MM.dd}"
  #   user => "elastic"
  #   password => "${ELASTIC_PASSWORD}"
  #   ssl => true
  #   cacert => "/etc/logstash/certs/ca.pem"
  # }
}
