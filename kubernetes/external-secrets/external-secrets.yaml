# External Secrets Operator installation
# T1.4.1: Allows Kubernetes to fetch secrets from Vault

apiVersion: v1
kind: Namespace
metadata:
  name: external-secrets
  labels:
    name: external-secrets

---
# CRDs for External Secrets
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: externalsecrets.external-secrets.io
spec:
  group: external-secrets.io
  versions:
    - name: v1beta1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                refreshInterval:
                  type: string
                secretStoreRef:
                  type: object
                  properties:
                    name:
                      type: string
                    kind:
                      type: string
                    properties:
                      template:
                        type: string
                target:
                  type: object
                  properties:
                    name:
                      type: string
                    creationPolicy:
                      type: string
                    template:
                      type: string
                      properties:
                        type:
                          type: string
                        data:
                          type: object
  names:
    kind: ExternalSecret
    listKind: ExternalSecretList
    plural: externalsecrets
    singular: externalsecret
  conversion:
    strategy: None

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets
  namespace: external-secrets

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: external-secrets
rules:
  - apiGroups: [""]
    resources: ["secrets", "namespaces"]
    verbs: ["get", "create", "update", "patch"]
  - apiGroups: ["external-secrets.io"]
    resources: ["externalsecrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["external-secrets.io"]
    resources: ["secretstores"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: external-secrets
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: external-secrets
subjects:
  - kind: ServiceAccount
    name: external-secrets
    namespace: external-secrets

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-secrets
  namespace: external-secrets
spec:
  replicas: 2
  selector:
    matchLabels:
      app: external-secrets
  template:
    metadata:
      labels:
        app: external-secrets
    spec:
      serviceAccountName: external-secrets
      containers:
        - name: external-secrets
          image: ghcr.io/external-secrets/external-secrets:v0.9.3
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          ports:
            - containerPort: 8080
              name: metrics
          args:
            - --metrics-addr=:8080
            - --health-probe-bind-address=:8081
            - --webhook-port=8443
            - --webhook-cert-dir=/tmp/webhook/certs
            - --max-concurrent-secret-reconciles=10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: external-secrets
  namespace: external-secrets
spec:
  selector:
    app: external-secrets
  ports:
    - name: metrics
      port: 8080
      targetPort: 8080

---
# MutatingWebhookConfiguration for External Secrets
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: external-secrets
webhooks:
  - name: webhook.external-secrets.io
    clientConfig:
      service:
        name: external-secrets
        namespace: external-secrets
        path: /mutate
      caBundle: ""  # Will be filled with proper cert
    rules:
      - operations: ["CREATE", "UPDATE"]
        apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["pods"]
        scope: "*"
    admissionReviewVersions: ["v1beta1"]
    sideEffects: None
    timeoutSeconds: 5
