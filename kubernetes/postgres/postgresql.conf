# PostgreSQL configuration with encryption best practices
# T1.4.4: Transparent Data Encryption (TDE) via SSL and pgcrypto

# === SSL/TLS for client connections ===
ssl = on
ssl_cert_file = '/etc/ssl/certs/postgres.crt'
ssl_key_file = '/etc/ssl/private/postgres.key'
# Enforce SSL for all connections
ssl_prefer_server_ciphers = on
ssl_min_protocol_version = 'TLSv1.3'
ssl_ciphers = 'HIGH:!aNULL:!MD5:!3DES'

# === Password encryption ===
password_encryption = scram-sha-256

# === Shared preload libraries for encryption functions ===
# pgcrypto provides PGP encryption functions and more
shared_preload_libraries = 'pgcrypto'

# === Audit and logging ===
log_connections = on
log_disconnections = on
log_line_prefix = '%m [%p] %u@%d '

# === WAL (Write-Ahead Logging) settings ===
wal_level = replica
wal_compression = on  # Compress WAL to reduce I/O

# === Other performance and security ===
max_connections = 200
shared_buffers = 2GB
effective_cache_size = 6GB

# === Encrypted tablespace support (conceptual) ===
# If using tablespace encryption, define tablespaces with encrypted device
# Example: CREATE TABLESPACE encrypted LOCATION '/mnt/encrypted_data';
