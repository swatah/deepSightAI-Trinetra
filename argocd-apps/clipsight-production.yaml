---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: clipsight-production
  namespace: argocd
  labels:
    app.kubernetes.io/name: clipsight-production
    app.kubernetes.io/part-of: clipsight
spec:
  project: production
  source:
    repoURL: https://github.com/swatah/ClipSight.git
    targetRevision: main
    path: k8s/overlays/production
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: clipsight-production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
    timeout: 15m
  health:
    healthRule:
      get:
        path: /health
        port: 8080
        scheme: HTTPS
        timeout: 10
    customHealthChecks:
    - group: apps
      kind: Deployment
      match: []
      name: main-api
      unhealthy: {}
    - group: apps
      kind: Deployment
      match: []
      name: embedder
      unhealthy: {}
    - group: apps
      kind: Deployment
      match: []
      name: extractor
      unhealthy: {}
    - group: apps
      kind: Deployment
      match: []
      name: registry
      unhealthy: {}
