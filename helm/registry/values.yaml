replicaCount: 1

image:
  repository: deepSightAI-Trinetra/registry
  tag: latest
  pullPolicy: IfNotPresent

config:
  LOG_LEVEL: INFO
  REDIS_URL: redis://redis:6379
  MINIO_URL: http://minio:9000

resources:
  requests:
    memory: "256Mi"
    cpu: "200m"
  limits:
    memory: "512Mi"
    cpu: "500m"

service:
  type: ClusterIP
  port: 8000
  targetPort: 8000

ingress:
  enabled: false
  annotations: {}
  hosts:
    - host: registry.deepSightAI-Trinetra.local
      paths: ["/"]
