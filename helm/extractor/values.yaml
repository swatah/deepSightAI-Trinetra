replicaCount: 2

image:
  repository: clipsight/extractor
  tag: latest
  pullPolicy: IfNotPresent

config:
  LOG_LEVEL: INFO
  REDIS_URL: redis://redis:6379
  REGISTRY_URL: http://registry:8000
  MINIO_URL: http://minio:9000

resources:
  requests:
    memory: "512Mi"
    cpu: "500m"
  limits:
    memory: "1Gi"
    cpu: "1000m"

service:
  type: ClusterIP
  port: 8001
  targetPort: 8001
