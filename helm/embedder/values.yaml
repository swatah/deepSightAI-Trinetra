replicaCount: 1

image:
  repository: clipsight/embedder
  tag: latest
  pullPolicy: IfNotPresent

config:
  LOG_LEVEL: INFO
  REDIS_URL: redis://redis:6379
  MINIO_URL: http://minio:9000
  MILVUS_HOST: milvus
  MILVUS_PORT: "19530"

resources:
  requests:
    memory: "2Gi"
    cpu: "1000m"
  limits:
    memory: "4Gi"
    cpu: "2000m"

service:
  type: ClusterIP
  port: 8001
  targetPort: 8001
