replicaCount: 1

image:
  repository: deepSightAI-Trinetra/main-api
  tag: latest
  pullPolicy: IfNotPresent

config:
  LOG_LEVEL: INFO
  REDIS_URL: redis://redis:6379
  REGISTRY_URL: http://registry:8000
  MINIO_URL: http://minio:9000
  MILVUS_HOST: milvus
  MILVUS_PORT: "19530"
  POSTGRES_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/deepSightAI-Trinetra

resources:
  requests:
    memory: "512Mi"
    cpu: "500m"
  limits:
    memory: "1Gi"
    cpu: "1000m"

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

ingress:
  enabled: false
  annotations: {}
  hosts:
    - host: api.deepSightAI-Trinetra.local
      paths: ["/"]
