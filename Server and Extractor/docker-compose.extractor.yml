services:
  db:
    image: postgres:15
    restart: always
    environment: { POSTGRES_USER: admin, POSTGRES_PASSWORD: secret, POSTGRES_DB: registry_db }
    volumes: [ "./volumes/postgres_data:/var/lib/postgresql/data/" ]
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U admin -d registry_db"], interval: 5s, timeout: 5s, retries: 5 }
    networks: [ video-net ]

  minio:
    image: minio/minio
    platform: linux/amd64
    restart: always
    environment: { MINIO_ROOT_USER: minioadmin, MINIO_ROOT_PASSWORD: minioadmin }
    volumes: [ "./volumes/minio:/minio_data" ]
    command: minio server /minio_data --console-address ":9090"
    ports: [ "9000:9000", "9090:9090" ]
    healthcheck: { test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"], interval: 10s, timeout: 5s, retries: 5 }
    networks: [ video-net ]

  registry:
    build: .
    command: uvicorn registry:app --host 0.0.0.0 --port 8000
    restart: always
    environment: { DATABASE_URL: "postgresql://admin:secret@db:5432/registry_db" }
    depends_on: { db: { condition: service_healthy } }
    healthcheck: { test: ["CMD", "curl", "-f", "http://localhost:8000/health"], interval: 5s, timeout: 3s, retries: 10 }
    networks: [ video-net ]

  input-router:
    build: .
    command: uvicorn main_api:app --host 0.0.0.0 --port 8080
    restart: always
    ports: [ "8080:8080" ]
    depends_on: { registry: { condition: service_healthy } }
    volumes: [ "./videos:/app/videos" ] # For video input
    networks: [ video-net ]

  extractor-1:
    build: .
    command: uvicorn extractor:app --host 0.0.0.0 --port 8001
    restart: always
    environment:
      - REGISTRY_URL=http://registry:8000
      - MINIO_URL=http://minio:9000 # Connects to the MinIO service
      - EXTRACTOR_ID=extractor-1
      - EXTRACTOR_URL=http://extractor-1:8001
      - PYTHONPATH=/usr/lib/python3/dist-packages
    depends_on: { registry: { condition: service_healthy }, minio: { condition: service_healthy } }
    networks: [ video-net ]
  
  extractor-2:
    build: .
    command: uvicorn extractor:app --host 0.0.0.0 --port 8002
    restart: always
    environment:
      - REGISTRY_URL=http://registry:8000
      - MINIO_URL=http://minio:9000
      - EXTRACTOR_ID=extractor-2
      - EXTRACTOR_URL=http://extractor-2:8002
      - PYTHONPATH=/usr/lib/python3/dist-packages
    depends_on: { registry: { condition: service_healthy }, minio: { condition: service_healthy } }
    networks: [ video-net ]

  extractor-3:
    build: .
    command: uvicorn extractor:app --host 0.0.0.0 --port 8003
    restart: always
    environment:
      - REGISTRY_URL=http://registry:8000
      - MINIO_URL=http://minio:9000
      - EXTRACTOR_ID=extractor-3
      - EXTRACTOR_URL=http://extractor-3:8003
      - PYTHONPATH=/usr/lib/python3/dist-packages
    depends_on: { registry: { condition: service_healthy }, minio: { condition: service_healthy } }
    networks: [ video-net ]
networks:
  video-net:

volumes:
  postgres_data:
  minio:
  